<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{EVENT_NAME}} — {{BRAND_NAME}}</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root { --bg:#15100C; --accent:{{ACCENT_COLOR}}; --accent-soft:{{ACCENT_COLOR_SOFT}}; --white:#FFFDF9; --muted:#B5A99B; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--white); font-family: 'Poppins', sans-serif; line-height: 1.6; }
  h1, h2 { font-weight: 900; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 0 24px; }
  section { padding: 56px 0; }

  .hero {
    min-height: 100svh; display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; padding: 40px 24px;
    background: radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--accent) 26%, transparent), transparent 55%), var(--bg);
  }
  .hero img { width: 72px; margin-bottom: 20px; border-radius: 10px; }
  .badge-urgent { display: inline-flex; align-items: center; gap: 8px; color: #0B0705; background: var(--accent); border-radius: 999px; font-size: 12.5px; font-weight: 800; letter-spacing: .03em; text-transform: uppercase; padding: 8px 14px; margin-bottom: 18px; animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .hero h1 { color: var(--white); font-size: clamp(30px, 6.4vw, 46px); margin-bottom: 16px; max-width: 580px; }
  .hero h1 strong { color: var(--accent); }
  .hero p { color: var(--muted); max-width: 460px; margin-bottom: 30px; font-size: 15.5px; }
  .invited-by { color: var(--accent-soft); font-size: 14px; margin-bottom: 14px; }

  .btn-accent { display: inline-block; background: var(--accent); color: #0B0705; font-weight: 800; padding: 17px 34px; border-radius: 12px; text-decoration: none; border: none; cursor: pointer; font-size: 16.5px; box-shadow: 0 14px 34px color-mix(in srgb, var(--accent) 35%, transparent); }

  .event-card { border: 2px solid var(--accent); border-radius: 16px; padding: 26px; max-width: 480px; margin: 0 auto; }
  .event-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.08); font-size: 14.5px; }
  .event-row:last-child { border-bottom: none; }
  .event-row .label { color: var(--muted); }

  .testimonial { max-width: 480px; margin: 0 auto; border: 1px dashed color-mix(in srgb, var(--accent) 50%, transparent); border-radius: 16px; padding: 22px; text-align: center; }
  .testimonial p { font-style: italic; opacity: .92; margin-bottom: 10px; }
  .testimonial span { color: var(--accent); font-size: 13px; font-weight: 700; }

  .form-card { background: rgba(255,255,255,0.03); border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent); border-radius: 20px; padding: 28px 24px; max-width: 440px; margin: 0 auto; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; color: var(--accent-soft); margin-bottom: 6px; font-weight: 700; }
  .field input { width: 100%; background: var(--bg); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; padding: 13px 15px; color: var(--white); font-size: 15px; font-family: inherit; outline: none; }
  .field input:focus { border-color: var(--accent); }
  .submit-btn { width: 100%; background: var(--accent); color: #0B0705; font-weight: 800; font-size: 16px; padding: 16px; border: none; border-radius: 12px; cursor: pointer; margin-top: 4px; }

  [data-rg-message] { text-align: center; padding: 14px; border-radius: 10px; margin-bottom: 16px; font-size: 14px; }

  h2.section-title { text-align: center; margin-bottom: 30px; font-size: 26px; color: var(--white); }
  footer { text-align: center; padding: 40px 0 56px; color: var(--muted); font-size: 12.5px; }
</style>
</head>
<body>

<section class="hero">
  <img src="{{BRAND_LOGO_URL}}" alt="{{BRAND_NAME}}">
  <div data-rg-invited-by style="display:none;">
    <span class="invited-by">Kamu diundang oleh <strong data-rg-referrer-name></strong></span>
  </div>
  <span class="badge-urgent">{{EYEBROW}}</span>
  <h1>{{HEADLINE}}</h1>
  <p>{{SUBHEADLINE}}</p>
  <a href="#daftar" class="btn-accent">{{CTA_TEXT}}</a>
</section>

<section>
  <div class="wrap">
    {{DESCRIPTION}}
  </div>
</section>

<section>
  <div class="wrap">
    <h2 class="section-title">Detail Acara</h2>
    <div class="event-card">
      <div class="event-row"><span class="label">Hari & Tanggal</span><span data-rg-field="event_day">—</span></div>
      <div class="event-row"><span class="label">Waktu</span><span data-rg-field="event_time">—</span></div>
      <div class="event-row"><span class="label">Lokasi</span><span data-rg-field="event_location">—</span></div>
      <div class="event-row"><span class="label">Pembicara</span><span data-rg-field="event_speaker">—</span></div>
      <div class="event-row"><span class="label">Kapasitas</span><span data-rg-field="event_capacity">—</span></div>
    </div>
  </div>
</section>

<!--SECTION:testimonial:start-->
<section>
  <div class="wrap">
    <div class="testimonial">
      <p>"{{TESTIMONIAL_QUOTE}}"</p>
      <span>— {{TESTIMONIAL_NAME}}</span>
    </div>
  </div>
</section>
<!--SECTION:testimonial:end-->

<section id="daftar">
  <div class="wrap">
    <h2 class="section-title">Daftar Sekarang — Kuota Terbatas!</h2>
    <div class="form-card">
      <div data-rg-message style="display:none;"></div>
      <form data-rg-form>
        <div class="field">
          <label>Nama Lengkap</label>
          <input type="text" name="name" placeholder="Nama lengkap kamu" required minlength="3">
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" name="email" placeholder="email@kamu.com" required>
        </div>
        <div class="field">
          <label>Nomor WhatsApp</label>
          <input type="tel" name="whatsapp" placeholder="08xxxxxxxxxx" required minlength="9">
        </div>
        <div class="field">
          <label>Kota Domisili</label>
          <input type="text" name="kota" placeholder="Kota kamu" required minlength="2">
        </div>
        <button type="submit" class="submit-btn">{{CTA_TEXT}}</button>
      </form>
    </div>
  </div>
</section>

<footer>
  <div class="wrap">{{BRAND_NAME}} — <span data-rg-field="event_name">{{EVENT_NAME}}</span></div>
</footer>

<script src="/assets/event-sdk.js" defer></script>
</body>
</html>
